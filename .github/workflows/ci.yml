name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - 'articles/**'
  pull_request:
    branches: [main]
    paths-ignore:
      - 'articles/**'
  workflow_dispatch:

jobs:
  binary_hygiene:
    name: Binary Hygiene
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Fail on tracked root binaries
        shell: bash
        run: |
          set -euo pipefail
          if git ls-files --error-unmatch jcs-canon >/dev/null 2>&1; then
            echo "tracked binary is not allowed: jcs-canon"
            exit 1
          fi
          if git ls-files --error-unmatch lattice-canon >/dev/null 2>&1; then
            echo "tracked binary is not allowed: lattice-canon"
            exit 1
          fi
          tracked_root_exec=$(git ls-files --stage | awk '$1 == "100755" && $4 !~ /\// {print $4}' | grep -Ev '\.(sh|bash)$' || true)
          if [ -n "$tracked_root_exec" ]; then
            echo "unexpected executable files tracked in repo root:"
            echo "$tracked_root_exec"
            exit 1
          fi

  lint:
    name: Lint
    needs: binary_hygiene
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: '1.24.x'
      - name: golangci-lint
        uses: golangci/golangci-lint-action@55c2c1448f86e01eaae002a5a3a9624417608d84 # v6.5.2
        with:
          version: v1.64.8
          args: --config=golangci.yml

  test_matrix:
    name: Vet+Unit (${{ matrix.os }}, Go ${{ matrix.go }})
    needs: [binary_hygiene, lint]
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        go: ['1.22.x', '1.23.x', '1.24.x']
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: ${{ matrix.go }}
      - name: go vet
        shell: bash
        run: go vet ./...
      - name: unit tests
        shell: bash
        run: go test $(go list ./... | grep -v '^github.com/lattice-substrate/json-canon/conformance$') -count=1 -timeout=20m

  conformance:
    name: Conformance
    needs: test_matrix
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: '1.24.x'
      - name: conformance (includes official ES6 10k checksum gate)
        run: go test ./conformance -count=1 -v -timeout=10m

  race:
    name: Race Tests
    needs: test_matrix
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: '1.24.x'
      - run: go test ./... -race -count=1 -timeout=25m

  fuzz:
    name: Fuzz Smoke
    needs: test_matrix
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: '1.24.x'
      - name: fuzz jcstoken
        run: go test ./jcstoken -run=^$ -fuzz=FuzzParseCanonicalRoundTrip -fuzztime=30s
      - name: fuzz jcsfloat
        run: go test ./jcsfloat -run=^$ -fuzz=FuzzFormatDoubleRoundTrip -fuzztime=30s

  reproducible_build:
    name: Reproducible Build
    needs: [conformance, race, fuzz]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: '1.24.x'
      - name: build twice and compare sha256
        shell: bash
        run: |
          set -euo pipefail
          tmpdir=$(mktemp -d)
          out1="$tmpdir/jcs-canon-a"
          out2="$tmpdir/jcs-canon-b"
          CGO_ENABLED=0 go build -trimpath -buildvcs=false -ldflags="-s -w -buildid= -X main.version=v0.0.0-dev" -o "$out1" ./cmd/jcs-canon
          CGO_ENABLED=0 go build -trimpath -buildvcs=false -ldflags="-s -w -buildid= -X main.version=v0.0.0-dev" -o "$out2" ./cmd/jcs-canon
          sha1=$(sha256sum "$out1" | awk '{print $1}')
          sha2=$(sha256sum "$out2" | awk '{print $1}')
          echo "first : $sha1"
          echo "second: $sha2"
          test "$sha1" = "$sha2"

  windows_native_reproducible_build:
    name: Windows Native Reproducible Build
    needs: [conformance, race, fuzz]
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: '1.24.x'
      - name: build twice and compare sha256
        shell: pwsh
        run: |
          $tmpdir = Join-Path $env:RUNNER_TEMP "repro-build"
          New-Item -ItemType Directory -Force -Path $tmpdir | Out-Null
          $out1 = Join-Path $tmpdir "jcs-canon-a.exe"
          $out2 = Join-Path $tmpdir "jcs-canon-b.exe"
          $env:CGO_ENABLED = "0"
          go build -trimpath -buildvcs=false '-ldflags=-s -w -buildid= -X main.version=v0.0.0-dev' -o $out1 ./cmd/jcs-canon
          go build -trimpath -buildvcs=false '-ldflags=-s -w -buildid= -X main.version=v0.0.0-dev' -o $out2 ./cmd/jcs-canon
          $sha1 = (Get-FileHash -Algorithm SHA256 $out1).Hash
          $sha2 = (Get-FileHash -Algorithm SHA256 $out2).Hash
          Write-Output "first : $sha1"
          Write-Output "second: $sha2"
          if ($sha1 -ne $sha2) {
            Write-Error "reproducible build mismatch"
            exit 1
          }

  windows_cross_compile:
    name: Windows Cross-Compile (${{ matrix.goarch }})
    needs: [conformance, race, fuzz]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        goarch: [amd64, arm64]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: '1.24.x'
      - name: cross-compile and verify reproducibility
        shell: bash
        run: |
          set -euo pipefail
          tmpdir=$(mktemp -d)
          out1="$tmpdir/jcs-canon-a.exe"
          out2="$tmpdir/jcs-canon-b.exe"
          GOOS=windows GOARCH=${{ matrix.goarch }} CGO_ENABLED=0 go build -trimpath -buildvcs=false -ldflags="-s -w -buildid= -X main.version=v0.0.0-dev" -o "$out1" ./cmd/jcs-canon
          GOOS=windows GOARCH=${{ matrix.goarch }} CGO_ENABLED=0 go build -trimpath -buildvcs=false -ldflags="-s -w -buildid= -X main.version=v0.0.0-dev" -o "$out2" ./cmd/jcs-canon
          sha1=$(sha256sum "$out1" | awk '{print $1}')
          sha2=$(sha256sum "$out2" | awk '{print $1}')
          echo "windows/${{ matrix.goarch }} first : $sha1"
          echo "windows/${{ matrix.goarch }} second: $sha2"
          test "$sha1" = "$sha2"
      - name: validate windows matrix and profile
        run: go test ./offline/replay -run TestLoadWindows -count=1 -v
